<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="kd-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="kd-k" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f7"/>
    </linearGradient>
    <filter id="kd-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Rounded square background with brand gradient -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#kd-bg)"/>
  <!-- Subtle inner highlight -->
  <rect x="48" y="48" width="416" height="416" rx="96" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  <!-- Stylized K letterform -->
  <g filter="url(#kd-glow)">
    <!-- Vertical stem of K -->
    <rect x="168" y="132" width="56" height="248" rx="16" fill="url(#kd-k)"/>
    <!-- Upper diagonal arm -->
    <path d="M 224 256 L 360 132 L 360 196 L 280 270 L 360 344 L 360 408 L 224 284 Z" fill="url(#kd-k)"/>
  </g>
  <!-- Accent dot (digital node) -->
  <circle cx="372" cy="120" r="20" fill="#ffffff" opacity="0.95"/>
  <circle cx="372" cy="120" r="20" fill="none" stroke="#06b6d4" stroke-width="3" opacity="0.8"/>
</svg>
