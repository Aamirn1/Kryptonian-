<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="kd-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="kd-arrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="kd-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Rounded square background with brand gradient -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#kd-bg)"/>
  <!-- Subtle inner highlight -->
  <rect x="48" y="48" width="416" height="416" rx="96" fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="2"/>
  <!-- Growth arrow: rising bar chart with upward arrow (white) -->
  <g filter="url(#kd-glow)">
    <!-- Base bars (shorter to taller, left to right) -->
    <rect x="120" y="316" width="52" height="76" rx="10" fill="#ffffff" opacity="0.55"/>
    <rect x="192" y="276" width="52" height="116" rx="10" fill="#ffffff" opacity="0.75"/>
    <rect x="264" y="236" width="52" height="156" rx="10" fill="#ffffff" opacity="0.92"/>
    <!-- Upward arrow (the growth signal) -->
    <path d="M 150 256 L 256 150 L 322 216 L 392 146" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arrowhead -->
    <path d="M 392 146 L 392 220 L 322 220 Z" fill="#ffffff"/>
    <!-- Arrowhead accent -->
    <path d="M 392 146 L 392 220 L 322 220 Z" fill="none" stroke="#06b6d4" stroke-width="4" opacity="0.6"/>
  </g>
</svg>
